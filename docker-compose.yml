services:
  mysql:
    image: mysql:8.4
    container_name: sql-anti-pattern-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bugs
      TZ: Asia/Tokyo
    ports:
      - "13306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      # /docker-entrypoint-initdb.d の *.sql は初回起動時に MYSQL_DATABASE に対して実行される
      - ./Introduction/setup.sql:/docker-entrypoint-initdb.d/10_setup.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mysql-data:
